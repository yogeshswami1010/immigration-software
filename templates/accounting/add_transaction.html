{% extends 'base.html' %}
{% block main %}

<div class="page-header">
    <div class="page-header-left d-flex align-items-center">
        <div class="page-header-title">
            <h5 class="m-b-10">Add Transaction</h5>
        </div>
        <ul class="breadcrumb">
            <li class="breadcrumb-item"><a href="/">Home</a></li>
            <li class="breadcrumb-item"><a href="{% url 'accounting_transactions' %}">Transactions</a></li>
            <li class="breadcrumb-item">Add</li>
        </ul>
    </div>
    <div class="page-header-right ms-auto">
        <a href="{% url 'accounting_transactions' %}" class="btn btn-secondary">Cancel</a>
    </div>
</div>

<div class="main-content">
    <div class="row">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h5>Transaction Information</h5>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Transaction Date <span class="text-danger">*</span></label>
                            <input type="date" name="transaction_date" class="form-control" value="{{ today|date:'Y-m-d' }}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Transaction Type <span class="text-danger">*</span></label>
                            <select name="transaction_type" class="form-select" required>
                                <option value="deposit">Deposit</option>
                                <option value="withdrawal">Withdrawal</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Account <span class="text-danger">*</span></label>
                            <select name="account" class="form-select select2" required>
                                <option value="">Select Account</option>
                                {% for account in accounts %}
                                <option value="{{ account.id }}">{{ account.name }} ({{ account.get_account_type_display }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Amount <span class="text-danger">*</span></label>
                            <input type="number" name="amount" class="form-control" step="0.01" min="0.01" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Description <span class="text-danger">*</span></label>
                            <textarea name="description" class="form-control" rows="3" required></textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Reference Number</label>
                            <input type="text" name="reference_number" class="form-control">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Category (Optional)</label>
                            <select name="category" class="form-select select2">
                                <option value="">Select Category</option>
                                {% for account in accounts %}
                                <option value="{{ account.id }}">{{ account.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6">
                                <button type="submit" class="btn btn-primary w-100">Create Transaction</button>
                            </div>
                            <div class="col-md-6">
                                <a href="{% url 'accounting_transactions' %}" class="btn btn-secondary w-100">Cancel</a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block script %}
<script>
    $(document).ready(function() {
        $('.select2').select2({
            width: '100%',
            theme: 'bootstrap-5'
        });
    });
</script>
{% endblock %}
